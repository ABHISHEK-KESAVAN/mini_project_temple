<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Temple Management System" />
    <title>Temple Management System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="google_translate_element"></div>
    <div id="root"></div>

    <style>
      /* Move translate control to a neat floating pill bottom-right */
      #google_translate_element {
        position: fixed;
        bottom: 18px;
        left: 18px;
        right: auto;
        z-index: 1000;
        font-size: 0.8rem;
      }

      @media (max-width: 600px) {
        #google_translate_element {
          bottom: 12px;
          left: 12px;
          right: auto;
          transform: scale(0.9);
          transform-origin: bottom left;
        }
      }

      .goog-te-gadget {
        font-family: inherit !important;
      }

      .goog-te-gadget-simple {
        background: radial-gradient(
            circle at 0 0,
            rgba(255, 255, 255, 0.25),
            transparent 55%
          ),
          rgba(18, 18, 24, 0.92) !important;
        border-radius: 999px !important;
        padding: 4px 12px !important;
        border: 1px solid rgba(255, 255, 255, 0.3) !important;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
      }

      .goog-te-gadget-simple span {
        color: #ffffff !important;
      }

      .goog-te-gadget-icon {
        display: none !important;
      }

      .goog-te-gadget-simple img {
        display: none !important;
      }
    </style>

    <script type="text/javascript">
      function googleTranslateElementInit() {
        if (window.google && window.google.translate) {
          new window.google.translate.TranslateElement(
            { pageLanguage: 'en', autoDisplay: false },
            'google_translate_element'
          );
        }
      }
    </script>
    <script
      type="text/javascript"
      src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"
    ></script>

    <!-- Ionicons for temple-style icons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
  </body>
</html>
